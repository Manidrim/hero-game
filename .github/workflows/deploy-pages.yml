name: Deploy to GitHub Pages

# Publie le site (main) sur GitHub Pages à chaque push sur main.
# URL publique : https://manidrim.github.io/hero-game/
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois ; annule les runs en cours au profit du dernier.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Active automatiquement GitHub Pages (mode Actions) si ce n'est pas
          # déjà fait, pour éviter l'erreur "Get Pages site failed / Not Found".
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Le site est à la racine du dépôt.
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
